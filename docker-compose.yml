services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lofc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lofc}
      POSTGRES_DB: ${POSTGRES_DB:-lofc}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lofc} -d ${POSTGRES_DB:-lofc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Inside the compose network the DB host is "db", not localhost.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://lofc:lofc@db:5432/lofc}
    volumes:
      # Live-mount source for development; the image still installs the package.
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
      - ./data:/app/data
    # Keep the container alive so `docker-compose run` / `exec` are convenient.
    command: ["tail", "-f", "/dev/null"]

  # Visual database browser at http://localhost:5050 (no SQL needed).
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lofc.com
      PGADMIN_DEFAULT_PASSWORD: admin
      # Open straight into the UI, no pgAdmin login or master password prompts.
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      # Pre-register the LOFC database so it appears in the sidebar automatically.
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  # The recruitment dashboard (Streamlit) at http://localhost:8501.
  dashboard:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://lofc:lofc@db:5432/lofc}
    volumes:
      - ./src:/app/src
      - ./assets:/app/assets
      - ./.streamlit:/app/.streamlit
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "src/lofc/dashboard/app.py",
              "--server.port=8501", "--server.address=0.0.0.0"]

  # Business-intelligence / self-serve reporting layer at http://localhost:3000.
  # Demonstrates the wider-BI growth path (commercial, academy, board) over the same
  # database. Free and open-source; first run needs a one-time setup in the browser.
  metabase:
    image: metabase/metabase:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Metabase stores its own config in an embedded H2 file on a persisted volume.
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

volumes:
  pgdata:
  pgadmin_data:
  metabase_data:
